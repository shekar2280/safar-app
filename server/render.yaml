services:
  - type: web
    name: safar-backend
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: firebase-service-account.json
      - key: OPEN_TRIP_MAP_API
        sync: false
      - key: WEATHER_API
        sync: false
      - key: UNSPLASH_API_KEY
        sync: false
      - key: TICKETMASTER_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: AMADEUS_API_KEY
        sync: false
      - key: AMADEUS_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
